<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upcoming Projects | Shuqran Real Estate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .property-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }
        .property-card { cursor: pointer; transition: 0.3s; position: relative; }
        .property-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .property-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 8px 8px 0 0; }
        
        /* MODAL STYLES */
        .project-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; padding: 20px; }
        .p-modal-content { background: #fff; margin: 30px auto; width: 90%; max-width: 900px; border-radius: 12px; position: relative; overflow: hidden; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .p-modal-header { position: relative; height: 400px; background: #000; }
        .p-modal-header img { width: 100%; height: 100%; object-fit: contain; }
        .close-p-modal { position: absolute; top: 15px; right: 20px; font-size: 30px; color: #fff; cursor: pointer; text-shadow: 0 2px 5px #000; z-index: 10; transition: 0.3s; }
        .close-p-modal:hover { color: #f39c12; }
        
        .p-modal-body { padding: 30px; }
        .p-gallery { display: flex; gap: 10px; overflow-x: auto; margin: 20px 0; padding-bottom: 10px; }
        .p-gallery img { width: 120px; height: 100px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid #ddd; flex-shrink: 0; }
        .p-gallery img:hover { border-color: #f39c12; }
        
        .p-info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; background: #f9f9f9; padding: 20px; border-radius: 8px; }
        .p-status-tag { display: inline-block; padding: 6px 12px; border-radius: 20px; background: #f39c12; color: #fff; font-size: 14px; margin-bottom: 10px; }

        /* GOOGLE MAP IN MODAL */
        .map-container-mini { margin-top: 30px; border-radius: 8px; overflow: hidden; height: 300px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .map-container-mini iframe { width: 100%; height: 100%; border: 0; }
    </style>
</head>
<body>

<header>
    <nav class="navbar">
        <img src="images/logo.png" alt="Logo">
        <div>
            <a href="index.html">Home</a>
            <a href="properties.html">Properties</a>
            <a href="construction.html">Construction</a>
            <a href="upcoming.html" class="active">Upcoming Projects</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
</header>

<section class="section page-header">
    <h1>Upcoming Projects</h1>
    <p>Premium Investment Opportunities in DHA City Karachi</p>
</section>

<section class="section">
    <div class="property-grid" id="projectGrid"></div>
</section>


<div id="detailModal" class="project-modal">
    <div class="p-modal-content">
        <span class="close-p-modal" onclick="closeDetailModal()">&times;</span>
        <div class="p-modal-header">
            <img id="mainModalImg" src="">
        </div>
        <div class="p-modal-body">
            <span id="modalStatus" class="p-status-tag"></span>
            <h2 id="modalTitle" style="font-size: 28px; color: #2c3e50; margin-bottom: 10px;"></h2>
            <p id="modalLoc" style="color: #666; font-size: 1.1rem; margin-bottom: 20px;"><i class="fas fa-map-marker-alt"></i> </p>
            
            <h3>Project Gallery</h3>
            <div class="p-gallery" id="modalGallery"></div>

            <h3 style="margin-top: 30px;">About the Project</h3>
            <p id="modalDesc" style="line-height: 1.8; color: #34495e;"></p>

            <div class="p-info-grid">
                <div><strong><i class="fas fa-th"></i> Total Units:</strong> <span id="modalUnits"></span></div>
                <div><strong><i class="fas fa-calendar-alt"></i> Completion:</strong> <span id="modalDate"></span></div>
            </div>

            <!-- GOOGLE MAP ADDED HERE -->
            <div class="map-container-mini">
                <iframe id="googleMapModal" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            
            <div style="margin-top: 30px; text-align: center;">
                <a href="contact.html" class="btn-primary" style="padding: 15px 40px;">Express Interest / Pre-Book</a>
            </div>
        </div>
    </div>
</div>

<script>
    let allProjects = [];

    async function fetchUpcoming() {
        try {
            const response = await fetch(API_BASE + '/api/projects/all');
            allProjects = await response.json();
            const grid = document.getElementById('projectGrid');
            grid.innerHTML = '';

            allProjects.forEach((p, index) => {
                const images = p.image_url ? p.image_url.split(',') : [];
                const mainThumb = images.length > 0 ? `${API_BASE}/uploads/${images[0]}` : 'images/default-project.jpg';

                grid.innerHTML += `
                    <div class="property-card" onclick="openDetailModal(${index})">
                        <span class="badge" style="position: absolute; top: 10px; left: 10px; background: #f39c12; color: #fff; padding: 5px 10px; border-radius: 4px;">${p.status}</span>
                        <img src="${mainThumb}" alt="Project Image">
                        <div style="padding: 15px;">
                            <h3 style="margin: 5px 0; color: #2c3e50;">${p.title}</h3>
                            <p class="location" style="font-size: 14px; color: #666;"><i class="fas fa-map-marker-alt"></i> ${p.location}</p>
                            <p style="color: #f39c12; font-weight: bold; margin-top: 10px;">View Details <i class="fas fa-arrow-right"></i></p>
                        </div>
                    </div>`;
            });
        } catch (err) { console.error("Error:", err); }
    }

    function openDetailModal(index) {
        const p = allProjects[index];
        const images = p.image_url ? p.image_url.split(',') : [];
        const baseUrl = API_BASE + '/uploads/';

        document.getElementById('modalTitle').innerText = p.title;
        document.getElementById('modalStatus').innerText = p.status;
        document.getElementById('modalLoc').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${p.location}`;
        document.getElementById('modalDesc').innerText = p.description || 'Details coming soon.';
        document.getElementById('modalUnits').innerText = p.total_units || 'To be announced';
        document.getElementById('modalDate').innerText = p.completion_date ? new Date(p.completion_date).toLocaleDateString() : 'TBA';
        
        const mainImg = document.getElementById('mainModalImg');
        mainImg.src = images.length > 0 ? baseUrl + images[0] : 'images/default-project.jpg';

        // Render Gallery
        const gallery = document.getElementById('modalGallery');
        gallery.innerHTML = '';
        images.forEach(img => {
            const gImg = document.createElement('img');
            gImg.src = baseUrl + img;
            gImg.onclick = () => mainImg.src = gImg.src;
            gallery.appendChild(gImg);
        });

        // UPDATED: Google Map Auto Load
        const locationQuery = encodeURIComponent(p.location);
        document.getElementById('googleMapModal').src = `https://maps.google.com/maps?q=${locationQuery}&t=&z=13&ie=UTF8&iwloc=&output=embed`;

        document.getElementById('detailModal').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function closeDetailModal() {
        document.getElementById('detailModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    window.onclick = function(event) {
        if (event.target == document.getElementById('detailModal')) closeDetailModal();
    }

    window.onload = fetchUpcoming;
</script>
<script src="config.js"></script>
</body>
</html>
