<!DOCTYPE html>
<html lang="en">
<head>
  <script>
(function () {
  const token = localStorage.getItem("adminToken");

  if (!token) {
    window.location.href = "admin-login.html";
  }
})();
</script>
  <meta charset="UTF-8">
  <title>Manage Properties | Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/admin.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    .action-btn { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.8em; margin-right: 5px; }
    .action-btn.edit { background: #3498db; color: white; }
    .action-btn.delete { background: #ff4d4d; color: white; }
    .action-btn:hover { opacity: 0.8; }
  </style>
</head>
<body class="admin-body">

<div class="admin-wrapper">
  <aside class="admin-sidebar">
    <div class="sidebar-header">
      <img src="../images/logo.png" alt="Logo" class="admin-logo">
      <h2>Shuqran Admin</h2>
    </div>
    <ul>
      <li><a href="dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="properties.html"><i class="fas fa-building"></i> Properties</a></li>
      <li><a href="add-property.html"><i class="fas fa-plus-square"></i> Add Property</a></li>
      <li><a href="edit-property.html"><i class="fas fa-building"></i> Edit Property</a></li>
      <li><a href="upcoming-projects.html"><i class="fas fa-project-diagram"></i> Upcoming Projects</a></li>
      <li><a href="add-upcoming-projects.html"><i class="fas fa-plus-circle"></i> Add Project</a></li>
      <li><a href="edit-upcoming-projects.html"><i class="fas fa-project-diagram"></i> Edit Upcoming Projects</a></li>
      <li><a href="construction-requests.html"><i class="fas fa-tools"></i> Construction</a></li>
      <li><a href="messages.html"><i class="fas fa-envelope"></i> Messages</a></li>
      <li><a href="change-credentials.html"><i class="fas fa-key"></i> Settings</a></li>
      <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <h1>Manage Properties</h1>
    </header>

    <section class="admin-content">
      <div class="content-header">
        <a href="add-property.html" class="admin-btn">+ Add New Property</a>
      </div>

      <table class="admin-table">
        <thead>
          <tr>
            <th>Image</th>
            <th>Title</th>
            <th>Price</th>
            <th>Location</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="propertyTableBody"></tbody>
      </table>
    </section>
  </div>
</div>

<script src="../config.js"></script>
<script>
  async function fetchProperties() {
    try {
      const response = await fetch(API_BASE + '/api/properties/all');
      const data = await response.json();
      const tbody = document.getElementById('propertyTableBody');
      tbody.innerHTML = '';

      data.forEach(p => {
        const imagesArray = p.images ? p.images.split(',') : [];
        const thumbUrl = imagesArray.length > 0
          ? `${API_BASE}/uploads/${imagesArray[0].trim()}`
          : '../images/logo.png';

        tbody.innerHTML += `
          <tr>
            <td>
              <img src="${thumbUrl}" alt="Property"
                   style="width:60px; height:60px; object-fit:cover; border-radius:5px; border:1px solid #ddd;"
                   onerror="this.src='../images/logo.png'">
            </td>
            <td style="font-weight:bold;">${p.title}</td>
            <td>PKR ${Number(p.price).toLocaleString()}</td>
            <td>${p.location}</td>
            <td><span class="status ${p.status.toLowerCase()}">${p.status}</span></td>
            <td>
              <button class="action-btn edit" onclick="openEditPage(${p.property_id})">
                <i class="fas fa-edit"></i> Edit
              </button>
              <button class="action-btn delete" onclick="deleteProp(${p.property_id})">
                <i class="fas fa-trash"></i> Delete
              </button>
            </td>
          </tr>`;
      });
    } catch (err) {
      console.error("Error:", err);
      document.getElementById('propertyTableBody').innerHTML = '<tr><td colspan="6" style="color:red; text-align:center;">Server error. Data not loaded.</td></tr>';
    }
  }

  function openEditPage(id) {
    window.location.href = `edit-property.html?id=${id}`;
  }

  async function deleteProp(id) {
    if (confirm("Are you sure you want to delete this property?")) {
      try {
        const response = await fetch(`${API_BASE}/api/properties/delete/${id}`, { method: 'DELETE' });
        const result = await response.json();
        if (result.success) {
          fetchProperties();
        } else {
          alert("Error: " + result.error);
        }
      } catch (err) { alert("Server connection issue!"); }
    }
  }

  function performLogout() {
    if (confirm("Logout karna chahte ho?")) {
      localStorage.removeItem('adminToken');
      localStorage.removeItem('adminUser');
      window.location.href = 'admin-login.html';
    }
  }

  window.onload = fetchProperties;
</script>

</body>
</html>
