<!DOCTYPE html>
<html lang="en">
<head>
  <script>
(function () {
  const token = localStorage.getItem("adminToken");

  if (!token) {
    window.location.href = "admin-login.html";
  }
})();
</script>
  <meta charset="UTF-8">
  <title>Add Upcoming Project | Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/admin.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
   
    .image-grid { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 10px; padding: 10px; border: 1px solid #eee; border-radius: 8px; background: #fafafa; min-height: 50px; }
    .preview-wrapper { position: relative; width: 120px; height: 120px; }
    .preview-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 2px solid #ddd; }
    .remove-btn {
        position: absolute; top: -8px; right: -8px; background: #ff4d4d; color: white;
        border-radius: 50%; width: 24px; height: 24px; text-align: center; line-height: 22px;
        cursor: pointer; font-size: 14px; font-weight: bold; border: 2px solid white;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center;
    }
    .remove-btn:hover { background: #cc0000; transform: scale(1.1); }
  </style>
</head>
<body class="admin-body">

<div class="admin-wrapper">

  <!-- SIDEBAR -->
  <aside class="admin-sidebar">
    <div class="sidebar-header">
      <img src="../images/logo.png" alt="Logo" class="admin-logo">
      <h2>Shuqran Admin</h2>
    </div>

    <ul>
      <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="properties.html"><i class="fas fa-building"></i> Properties</a></li>
      <li><a href="add-property.html"><i class="fas fa-plus-square"></i> Add Property</a></li>
      <li><a href="upcoming-projects.html"><i class="fas fa-project-diagram"></i> Upcoming Projects</a></li>
      <li><a href="add-upcoming-projects.html" class="active"><i class="fas fa-plus-circle"></i> Add Upcoming Project</a></li>
      <li><a href="construction-requests.html"><i class="fas fa-tools"></i> Construction Requests</a></li>
      <li><a href="messages.html"><i class="fas fa-envelope"></i> Messages</a></li>
      
    </ul>
  </aside>

  <!-- MAIN -->
  <div class="admin-main">

    <header class="admin-topbar">
      <h1>Add Upcoming Project</h1>
    </header>

    <section class="admin-section">

      <form class="admin-form" id="addProjectForm">

        <label>Project Title</label>
        <input type="text" id="proj_title" placeholder="e.g. Luxury Villas – Sector 14" required>

        <label>Location</label>
        <input type="text" id="proj_loc" placeholder="e.g. DHA City Karachi" required>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div>
            <label>Total Units</label>
            <input type="number" id="proj_units" placeholder="e.g. 50">
          </div>
          <div>
            <label>Status</label>
            <select id="proj_status">
              <option value="Upcoming">Upcoming</option>
              <option value="In Progress">In Progress</option>
              <option value="Pre-Booking">Pre-Booking</option>
            </select>
          </div>
        </div>

        <label>Description</label>
        <textarea id="proj_desc" rows="4" placeholder="Short description about the project"></textarea>

        <!-- Multiple Image Upload with Preview -->
        <label style="font-weight:bold; margin-top:15px; display:block;">Upload Project Photos</label>
        <input type="file" id="proj_images" multiple accept="image/*" onchange="previewImages(this)">
        
        <!-- Preview Container -->
        <div id="new_preview" class="image-grid"></div>

        <button type="submit" id="submitBtn" class="admin-btn" style="margin-top: 20px;">Save Project</button>
        <a href="upcoming-projects.html" style="display:block; text-align:center; margin-top:10px; color:#666;">Cancel</a>

      </form>

    </section>

  </div>

</div>

<script>
  let selectedFiles = [];

  // Function to Preview Images 
  function previewImages(input) {
    const files = Array.from(input.files);
    selectedFiles = [...selectedFiles, ...files];
    input.value = ""; 
    renderPreviews();
  }

  function renderPreviews() {
    const container = document.getElementById('new_preview');
    container.innerHTML = '';
    selectedFiles.forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = e => {
            const div = document.createElement('div');
            div.className = 'preview-wrapper';
            div.innerHTML = `
                <img src="${e.target.result}">
                <span class="remove-btn" onclick="removeImage(${index})">&times;</span>`;
            container.appendChild(div);
        }
        reader.readAsDataURL(file);
    });
  }

  function removeImage(index) {
      selectedFiles.splice(index, 1);
      renderPreviews();
  }

  // Form Submission Logic (UPDATED FOR STABILITY)
  document.getElementById('addProjectForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      if(selectedFiles.length === 0) {
          alert("Please upload at least one project photo!");
          return;
      }

      const btn = document.getElementById('submitBtn');
      // Button pehle se disable kar dein taaki double click na ho
      btn.disabled = true;
      btn.innerText = "Saving...";

      const formData = new FormData();
      formData.append('title', document.getElementById('proj_title').value);
      formData.append('location', document.getElementById('proj_loc').value);
      formData.append('status', document.getElementById('proj_status').value);
      formData.append('total_units', document.getElementById('proj_units').value);
      formData.append('description', document.getElementById('proj_desc').value);
      
      // Append multiple images
      selectedFiles.forEach(file => formData.append('images', file));

      try {
          const response = await fetch(API_BASE + '/api/projects/add', {
              method: 'POST',
              body: formData
          });

          // NEW: Check if server sent OK (200)
          if (response.ok) {
              const result = await response.json();
              // Success check
              if(result.success) {
                  alert("✅ Project Added Successfully!");
                  window.location.href = 'upcoming-projects.html';
              } else {
                  // Server rejected logic (e.g. missing fields)
                  alert("❌ Server Logic Error: " + result.error);
                  btn.disabled = false;
                  btn.innerText = "Save Project";
              }
          } else {
              // Server sent 500 Error
              const errText = await response.text();
              alert("❌ Server Returned Error: " + errText);
              btn.disabled = false;
              btn.innerText = "Save Project";
          }

      } catch (err) {
          // Network Error (Internet off or Server Crash)
          console.error("Network/Catch Error:", err);
          alert("❌ Network Error: " + err.message);
          // Even if error, reload page just in case data saved
          setTimeout(() => { window.location.reload(); }, 2000);
          btn.disabled = false;
          btn.innerText = "Save Project";
      }
  });
</script>

<script src="../config.js"></script>
</body>
</html>
