<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/admin.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <script src="../config.js"></script>

  <!-- 🔐 AUTH GUARD (IMPORTANT) -->
  <script>
    (function () {
      const token = localStorage.getItem("adminToken");

      if (!token) {
        window.location.href = "admin-login.html";
      }
    })();
  </script>
</head>

<body class="admin-body">

<div class="admin-wrapper">

  <aside class="admin-sidebar">
    <div class="sidebar-header">
      <img src="../images/logo.png" class="admin-logo">
      <h2>Shuqran Admin</h2>
    </div>

    <ul>
      <li><a href="dashboard.html" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="properties.html"><i class="fas fa-building"></i> Properties</a></li>
      <li><a href="add-property.html"><i class="fas fa-plus-square"></i> Add Property</a></li>
      <li><a href="upcoming-projects.html"><i class="fas fa-project-diagram"></i> Upcoming Projects</a></li>
      <li><a href="add-upcoming-projects.html"><i class="fas fa-plus-circle"></i> Add Project</a></li>
      <li><a href="construction-requests.html"><i class="fas fa-tools"></i> Construction</a></li>
      <li><a href="messages.html"><i class="fas fa-envelope"></i> Messages</a></li>
      <li><a href="change-credentials.html"><i class="fas fa-key"></i> Settings</a></li>
      <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </aside>

  <div class="admin-main">

    <header class="admin-topbar">
      <h1>Dashboard</h1>
    </header>

    <section class="dashboard">

      <a href="construction-requests.html" class="card">
        <i class="fas fa-tools"></i>
        <h3>Construction Requests</h3>
        <strong id="count-construction">0</strong>
      </a>

      <a href="messages.html" class="card">
        <i class="fas fa-envelope"></i>
        <h3>Messages</h3>
        <strong id="count-messages">0</strong>
      </a>

      <a href="properties.html" class="card">
        <i class="fas fa-building"></i>
        <h3>Properties</h3>
        <strong id="count-properties">0</strong>
      </a>

      <a href="upcoming-projects.html" class="card">
        <i class="fas fa-project-diagram"></i>
        <h3>Projects</h3>
        <strong id="count-projects">0</strong>
      </a>

    </section>

  </div>
</div>

<script>
async function loadDashboard() {
  try {
    const res = await fetch(API_BASE + "/api/admin/stats");

    if (!res.ok) throw new Error("Server error");

    const data = await res.json();

    if (data.success) {
      document.getElementById("count-construction").innerText = data.data.totalConstruction;
      document.getElementById("count-messages").innerText = data.data.totalMessages;
      document.getElementById("count-properties").innerText = data.data.totalProperties;
      document.getElementById("count-projects").innerText = data.data.totalProjects;
    }
  } catch (err) {
    console.log("Dashboard error:", err);
  }
}

function logout() {
  localStorage.removeItem("adminToken");
  localStorage.removeItem("adminUser");
  window.location.href = "admin-login.html";
}

window.onload = loadDashboard;
</script>

</body>
</html>
