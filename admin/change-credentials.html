<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Credentials | Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/admin.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="admin-body">

<div class="admin-wrapper">
  <aside class="admin-sidebar">
    <div class="sidebar-header">
      <img src="../images/logo.png" alt="Logo" class="admin-logo">
      <h2>Shuqran Admin</h2>
    </div>
    <ul>
      <li><a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
      <li><a href="properties.html"><i class="fas fa-building"></i> Properties</a></li>
      <li><a href="add-property.html"><i class="fas fa-plus-square"></i> Add Property</a></li>
      <li><a href="upcoming-projects.html"><i class="fas fa-project-diagram"></i> Upcoming Projects</a></li>
      <li><a href="add-upcoming-projects.html"><i class="fas fa-plus-circle"></i> Add Upcoming Project</a></li>
      <li><a href="construction-requests.html"><i class="fas fa-tools"></i> Construction Requests</a></li>
      <li><a href="messages.html"><i class="fas fa-envelope"></i> Messages</a></li>
      <li><a href="change-credentials.html" class="active"><i class="fas fa-key"></i> Change Credentials</a></li>
      <li><a href="#" onclick="performLogout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
    </ul>
  </aside>

  <div class="admin-main">
    <header class="admin-topbar">
      <h1><i class="fas fa-key"></i> Change Username & Password</h1>
    </header>

    <section class="admin-section" style="max-width: 550px;">
      <div style="background: #fff8e1; border-left: 4px solid #f39c12; padding: 12px 16px; border-radius: 4px; margin-bottom: 20px; font-size: 0.9em; color: #7d5200;">
        <i class="fas fa-info-circle"></i>
        <strong>Note:</strong> Sirf apna account update kar sakte ho. Purana username aur password verify hoga.
      </div>

      <form class="admin-form" id="credentialsForm">

        <label>Purana Username (Current)</label>
        <input type="text" id="currentUsername" placeholder="Apna purana username likho" required>

        <label>Purana Password (Current)</label>
        <div style="position: relative;">
          <input type="password" id="currentPassword" placeholder="Apna purana password likho" required style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
          <i class="fas fa-eye" id="toggleOld" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#666;"></i>
        </div>

        <hr style="margin: 20px 0;">

        <label>Naya Username</label>
        <input type="text" id="newUsername" placeholder="Naya username" required>

        <label>Naya Password</label>
        <div style="position: relative;">
          <input type="password" id="newPassword" placeholder="Naya password (kam az kam 6 characters)" required minlength="6" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;">
          <i class="fas fa-eye" id="toggleNew" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; color:#666;"></i>
        </div>

        <label>Naya Password Confirm</label>
        <input type="password" id="confirmPassword" placeholder="Dobara naya password likho" required>

        <button type="submit" id="submitBtn" class="admin-btn" style="margin-top: 20px; width: 100%;">
          <i class="fas fa-save"></i> Update Credentials
        </button>

        <p id="resultMsg" style="margin-top: 15px; text-align: center; font-weight: bold;"></p>
      </form>
    </section>
  </div>
</div>

<script src="../config.js"></script>
<script>
  // Auto-fill current username from localStorage
  const savedUser = localStorage.getItem('adminUser');
  if (savedUser) {
    document.getElementById('currentUsername').value = savedUser;
  }

  // Password toggle helpers
  function makeToggle(toggleId, inputId) {
    document.getElementById(toggleId).addEventListener('click', function() {
      const input = document.getElementById(inputId);
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      this.classList.toggle('fa-eye');
      this.classList.toggle('fa-eye-slash');
    });
  }
  makeToggle('toggleOld', 'currentPassword');
  makeToggle('toggleNew', 'newPassword');

  document.getElementById('credentialsForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const currentUsername = document.getElementById('currentUsername').value.trim();
    const currentPassword = document.getElementById('currentPassword').value;
    const newUsername = document.getElementById('newUsername').value.trim();
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const msg = document.getElementById('resultMsg');
    const btn = document.getElementById('submitBtn');

    // Validation
    if (newPassword !== confirmPassword) {
      msg.style.color = 'red';
      msg.innerText = '❌ Naya password aur confirm password match nahi karte!';
      return;
    }

    if (newPassword.length < 6) {
      msg.style.color = 'red';
      msg.innerText = '❌ Naya password kam az kam 6 characters ka hona chahiye.';
      return;
    }

    btn.disabled = true;
    btn.innerText = 'Updating...';
    msg.innerText = '';

    try {
      const res = await fetch(API_BASE + '/api/admin/change-credentials', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ currentUsername, currentPassword, newUsername, newPassword })
      });

      const data = await res.json();

      if (data.success) {
        msg.style.color = 'green';
        msg.innerText = '✅ ' + data.message;
        // Update localStorage with new username
        localStorage.setItem('adminUser', newUsername);
        // Clear form
        document.getElementById('credentialsForm').reset();
        document.getElementById('currentUsername').value = newUsername;

        setTimeout(() => {
          alert('Credentials update ho gaye! Ab naye username/password se login karein.');
          localStorage.removeItem('adminToken');
          localStorage.removeItem('adminUser');
          window.location.href = 'admin-login.html';
        }, 2000);

      } else {
        msg.style.color = 'red';
        msg.innerText = '❌ ' + data.message;
      }
    } catch (err) {
      msg.style.color = 'red';
      msg.innerText = '❌ Server error. Try again.';
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.innerText = 'Update Credentials';
    }
  });

  function performLogout() {
    if (confirm('Logout karna chahte ho?')) {
      localStorage.removeItem('adminToken');
      localStorage.removeItem('adminUser');
      window.location.href = 'admin-login.html';
    }
  }
</script>
</body>
</html>
