<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Properties | Shuqran Real Estate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* 3 Column Grid Setup */
    .property-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
      padding: 20px 0;
    }
    .property-card { 
      cursor: pointer; 
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: 0.3s ease;
      position: relative;
      height: 100%; /* Ensure cards stretch equally */
    }
    .property-card:hover { transform: translateY(-8px); box-shadow: 0 12px 30px rgba(0,0,0,0.15); }
    .property-card img { width: 100%; height: 220px; object-fit: cover; }
    .badge { position: absolute; top: 15px; left: 15px; background: var(--accent-gold); color: #fff; padding: 5px 12px; border-radius: 4px; font-weight: bold; z-index: 5; }
    .card-info { padding: 15px; }
    .card-info h3 { color: var(--accent-gold); margin: 5px 0; font-size: 1.3rem; }
    
    
    .card-info .title { 
      font-weight: bold; 
      font-size: 1.1rem; 
      margin-bottom: 5px; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
    }
    
    .card-info .loc { color: #666; font-size: 0.9rem; }

    .loader {
      border: 5px solid #f3f3f3;
      border-top: 5px solid var(--accent-gold);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 50px auto;
      grid-column: 1/-1; 
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

   
    .search-filter-container {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      margin-bottom: 30px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      align-items: center;
    }
    .search-filter-container input, .search-filter-container select {
      padding: 10px 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 1rem;
    }
    .search-filter-container input { flex-grow: 1; max-width: 400px; }
    .search-filter-container select { min-width: 150px; cursor: pointer; }

    @media (max-width: 992px) { .property-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 650px) { .property-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>
  <nav class="navbar">
    <img src="images/logo.png">
    <div>
      <a href="index.html">Home</a>
      <a href="properties.html" class="active">Properties</a>
      <a href="construction.html">Construction</a>
      <a href="upcoming.html">Upcoming Projects</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>
</header>

<section class="section" style="max-width: 1200px; margin: 0 auto; padding: 0 20px;">
  <h1 style="text-align:center; margin-top: 30px;">Available Properties</h1>

  <div class="search-filter-container">
    <input type="text" id="searchInput" placeholder="Search title or location...">
    <select id="filterType">
      <option value="All">All Types</option>
      <option value="Apartment">Apartment</option>
      <option value="Villa">Villa</option>
      <option value="Plot">Plot / Land</option>
      <option value="Commercial">Commercial</option>
      <option value="Office">Office</option>
      <option value="Shop">Shop</option>
      <option value="Farmhouse">Farmhouse</option>
    </select>
  </div>

  <div class="property-grid" id="propGrid">
   
  </div>
</section>

<script>
let allProps = [];
const grid = document.getElementById('propGrid');

async function loadProps() {
    grid.innerHTML = '<div class="loader"></div>';

    try {
        const res = await fetch(API_BASE + '/api/properties/all');
        allProps = await res.json();
        
        renderProps(allProps);
        
        document.getElementById('searchInput').addEventListener('input', filterProps);
        document.getElementById('filterType').addEventListener('change', filterProps);

    } catch (err) { 
        console.error("Error:", err); 
        grid.innerHTML = '<p style="text-align:center; color:red;">Error loading properties. Please check connection.</p>';
    }
}

// Render Function to display properties
function renderProps(propsToRender) {
    grid.innerHTML = ''; // Clear grid

    if (propsToRender.length === 0) {
        grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #666; font-size: 1.2rem;">No properties found matching your criteria.</p>';
        return;
    }

    propsToRender.forEach((p) => {
        const imgs = p.images ? p.images.split(',') : [];
        const thumb = imgs.length > 0 ? `${API_BASE}/uploads/${imgs[0]}` : 'images/placeholder.jpg';
        
        const displayPrice = p.price >= 10000000 
            ? (p.price/10000000).toFixed(2) + " Crore" 
            : (p.price/100000).toFixed(2) + " Lakh";

        grid.innerHTML += `
        <div class="property-card" onclick="window.location.href='property-details.html?id=${p.property_id}'">
            <span class="badge">${p.status}</span>
            <img src="${thumb}">
            <div class="card-info">
                <h3>PKR ${displayPrice}</h3>
                <div class="title" title="${p.title}">${p.title}</div> <!-- title attribute shows full text on hover -->
                <div class="loc"><i class="fas fa-map-marker-alt"></i> ${p.location}</div>
            </div>
        </div>`;
    });
}

function filterProps() {
    const searchVal = document.getElementById('searchInput').value.toLowerCase();
    const filterType = document.getElementById('filterType').value;

    const filtered = allProps.filter(p => {
        const matchesSearch = p.title.toLowerCase().includes(searchVal) || p.location.toLowerCase().includes(searchVal);
        const matchesType = filterType === 'All' || p.property_type === filterType;
        return matchesSearch && matchesType;
    });

    renderProps(filtered);
}

window.onload = loadProps;
</script>
<script src="config.js"></script>
</body>
</html>
